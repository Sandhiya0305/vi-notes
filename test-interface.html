<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vi-Notes Text Analyzer - Real-Time Testing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .input-section {
            margin-bottom: 30px;
        }
        
        .input-section label {
            display: block;
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }
        
        textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        button {
            flex: 1;
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .analyze-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .clear-btn {
            background: #f0f0f0;
            color: #333;
        }
        
        .clear-btn:hover {
            background: #e0e0e0;
        }
        
        .results {
            display: none;
        }
        
        .results.show {
            display: block;
        }
        
        .result-card {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        
        .result-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .metric:last-child {
            border-bottom: none;
        }
        
        .metric-label {
            font-weight: 600;
            color: #555;
        }
        
        .metric-value {
            color: #333;
            font-family: 'Courier New', monospace;
        }
        
        .verdict {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            margin-top: 20px;
        }
        
        .verdict h2 {
            font-size: 1.8em;
            margin-bottom: 10px;
        }
        
        .verdict p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #fee;
            border-left: 4px solid #f44;
            padding: 15px;
            border-radius: 8px;
            color: #c33;
            display: none;
        }
        
        .error.show {
            display: block;
        }
        
        .examples {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .examples h3 {
            margin-bottom: 15px;
            color: #667eea;
        }
        
        .example-btn {
            display: inline-block;
            padding: 8px 15px;
            margin: 5px;
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        
        .example-btn:hover {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Vi-Notes Text Analyzer</h1>
            <p>Real-Time AI vs Human Text Detection</p>
        </div>
        
        <div class="content">
            <div class="input-section">
                <label for="textInput">Enter or paste text to analyze:</label>
                <textarea id="textInput" placeholder="Type or paste your text here..."></textarea>
            </div>
            
            <div class="button-group">
                <button class="analyze-btn" onclick="analyzeText()">🔬 Analyze Text</button>
                <button class="clear-btn" onclick="clearAll()">🗑️ Clear</button>
            </div>
            
            <div class="error" id="error"></div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Analyzing text...</p>
            </div>
            
            <div class="results" id="results">
                <div class="result-card">
                    <h3>📏 Sentence Length Analysis</h3>
                    <div id="sentenceLength"></div>
                </div>
                
                <div class="result-card">
                    <h3>📚 Vocabulary Diversity</h3>
                    <div id="vocabularyDiversity"></div>
                </div>
                
                <div class="result-card">
                    <h3>🔄 Word Frequency & Repetition</h3>
                    <div id="wordFrequency"></div>
                </div>
                
                <div class="verdict" id="verdict"></div>
            </div>
            
            <div class="examples">
                <h3>📝 Try Example Texts:</h3>
                <button class="example-btn" onclick="loadExample('human')">Human-Written Example</button>
                <button class="example-btn" onclick="loadExample('ai')">AI-Generated Example</button>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:3000/api/analyze';
        
        const examples = {
            human: `The quick brown fox jumps over the lazy dog. This is a simple sentence that demonstrates natural human writing. Sometimes I pause to think about what to write next. My thoughts flow irregularly, with varying sentence lengths and structures. I might use uncommon words occasionally, but mostly stick to everyday language. Writing feels organic and unplanned, with natural variations in rhythm and style.`,
            ai: `The technology is improving rapidly. The technology changes how we live. The technology affects our daily routines. The system works efficiently. The system processes data quickly. The system delivers results consistently. Innovation drives progress forward. Innovation creates new opportunities. Innovation transforms industries completely. Development continues steadily. Development brings improvements regularly.`
        };
        
        function loadExample(type) {
            document.getElementById('textInput').value = examples[type];
        }
        
        function clearAll() {
            document.getElementById('textInput').value = '';
            document.getElementById('results').classList.remove('show');
            document.getElementById('error').classList.remove('show');
        }
        
        async function analyzeText() {
            const text = document.getElementById('textInput').value.trim();
            const errorDiv = document.getElementById('error');
            const loadingDiv = document.getElementById('loading');
            const resultsDiv = document.getElementById('results');
            
            // Hide previous results
            errorDiv.classList.remove('show');
            resultsDiv.classList.remove('show');
            
            if (!text) {
                errorDiv.textContent = 'Please enter some text to analyze.';
                errorDiv.classList.add('show');
                return;
            }
            
            // Show loading
            loadingDiv.classList.add('show');
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text })
                });
                
                const result = await response.json();
                
                loadingDiv.classList.remove('show');
                
                if (!response.ok || result.error) {
                    errorDiv.textContent = result.error || 'Analysis failed. Please try again.';
                    errorDiv.classList.add('show');
                    return;
                }
                
                displayResults(result.data);
                
            } catch (error) {
                loadingDiv.classList.remove('show');
                errorDiv.textContent = 'Error connecting to server. Make sure the server is running on port 3000.';
                errorDiv.classList.add('show');
                console.error('Error:', error);
            }
        }
        
        function displayResults(data) {
            // Sentence Length
            const sentenceDiv = document.getElementById('sentenceLength');
            sentenceDiv.innerHTML = `
                <div class="metric">
                    <span class="metric-label">Mean Length:</span>
                    <span class="metric-value">${data.sentenceLength.meanLength.toFixed(2)} words</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Standard Deviation:</span>
                    <span class="metric-value">${data.sentenceLength.standardDeviation.toFixed(2)}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Min Length:</span>
                    <span class="metric-value">${data.sentenceLength.minLength} words</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Max Length:</span>
                    <span class="metric-value">${data.sentenceLength.maxLength} words</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Sentence Count:</span>
                    <span class="metric-value">${data.sentenceLength.sentenceCount}</span>
                </div>
            `;
            
            // Vocabulary Diversity
            const vocabDiv = document.getElementById('vocabularyDiversity');
            vocabDiv.innerHTML = `
                <div class="metric">
                    <span class="metric-label">Total Words:</span>
                    <span class="metric-value">${data.vocabularyDiversity.totalWords}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Unique Words:</span>
                    <span class="metric-value">${data.vocabularyDiversity.uniqueWords}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Diversity Ratio:</span>
                    <span class="metric-value">${data.vocabularyDiversity.diversityRatio.toFixed(4)}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Hapax Legomena:</span>
                    <span class="metric-value">${data.vocabularyDiversity.hapaxLegomena}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Hapax Ratio:</span>
                    <span class="metric-value">${data.vocabularyDiversity.hapaxRatio.toFixed(4)}</span>
                </div>
            `;
            
            // Word Frequency
            const freqDiv = document.getElementById('wordFrequency');
            const topWords = data.wordFrequency.mostCommon.slice(0, 5)
                .map(([word, count]) => `${word} (${count})`)
                .join(', ');
            const topBigrams = data.wordFrequency.topBigrams.slice(0, 3)
                .map(([bigram, count]) => `"${bigram}" (${count})`)
                .join(', ');
            
            freqDiv.innerHTML = `
                <div class="metric">
                    <span class="metric-label">Repetition Rate:</span>
                    <span class="metric-value">${data.wordFrequency.repetitionRate.toFixed(4)}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Top Words:</span>
                    <span class="metric-value">${topWords || 'N/A'}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Top Bigrams:</span>
                    <span class="metric-value">${topBigrams || 'N/A'}</span>
                </div>
            `;
            
            // Verdict
            const verdict = determineVerdict(data);
            const verdictDiv = document.getElementById('verdict');
            verdictDiv.innerHTML = `
                <h2>${verdict.icon} ${verdict.title}</h2>
                <p>${verdict.description}</p>
            `;
            
            document.getElementById('results').classList.add('show');
        }
        
        function determineVerdict(data) {
            const diversityRatio = data.vocabularyDiversity.diversityRatio;
            const repetitionRate = data.wordFrequency.repetitionRate;
            const stdDev = data.sentenceLength.standardDeviation;
            
            let score = 0;
            let indicators = [];
            
            // Check diversity ratio
            if (diversityRatio < 0.5) {
                score += 3;
                indicators.push('Low vocabulary diversity');
            } else if (diversityRatio > 0.7) {
                score -= 2;
                indicators.push('High vocabulary diversity');
            }
            
            // Check repetition rate
            if (repetitionRate > 0.3) {
                score += 3;
                indicators.push('High repetition rate');
            } else if (repetitionRate < 0.15) {
                score -= 2;
                indicators.push('Low repetition rate');
            }
            
            // Check sentence variation
            if (stdDev < 1.0) {
                score += 2;
                indicators.push('Uniform sentence lengths');
            } else if (stdDev > 3.0) {
                score -= 2;
                indicators.push('Varied sentence lengths');
            }
            
            if (score >= 4) {
                return {
                    icon: '🤖',
                    title: 'Likely AI-Generated',
                    description: `This text shows characteristics typical of AI-generated content: ${indicators.join(', ')}.`
                };
            } else if (score <= -2) {
                return {
                    icon: '✍️',
                    title: 'Likely Human-Written',
                    description: `This text shows characteristics typical of human writing: ${indicators.join(', ')}.`
                };
            } else {
                return {
                    icon: '🤔',
                    title: 'Inconclusive',
                    description: `The text shows mixed characteristics. It may be human-written with editing, or AI-generated with modifications.`
                };
            }
        }
        
        // Allow Enter key to submit (with Shift+Enter for new line)
        document.getElementById('textInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                analyzeText();
            }
        });
    </script>
</body>
</html>
